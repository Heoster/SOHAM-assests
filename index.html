<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>File Navigator</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        .file-item { margin: 10px 0; padding: 10px; border: 1px solid #ccc; border-radius: 5px; display: flex; justify-content: space-between; align-items: center; max-width: 500px; }
        a { text-decoration: none; color: #007BFF; font-weight: bold; }
        button { padding: 5px 10px; cursor: pointer; }
    </style>
</head>
<body>
    <h1>Project Files</h1>
    
    <!-- File 1 -->
    <div class="file-item">
        <span>ANIMATION.html</span>
        <button onclick="copyLink('ANIMATION.html')">Copy Link</button>
        <a href="ANIMATION.html" target="_blank">Open</a>
    </div>

    <!-- File 2 -->
    <div class="file-item">
        <span>FINALSOHAM.png</span>
        <button onclick="copyLink('FINALSOHAM.png')">Copy Link</button>
        <a href="FINALSOHAM.png" target="_blank">Open</a>
    </div>

    <!-- File 3 -->
    <div class="file-item">
        <span>logo.html</span>
        <button onclick="copyLink('logo.html')">Copy Link</button>
        <a href="logo.html" target="_blank">Open</a>
    </div>

    <!-- File 4 -->
    <div class="file-item">
        <span>introducing-animation.html</span>
        <button onclick="copyLink('introducing-animation.html')">Copy Link</button>
        <a href="introducing-animation.html" target="_blank">Open</a>
    </div>

    <script>
        function copyLink(filename) {
            // Creates an absolute path based on current location
            const link = window.location.origin + window.location.pathname.substring(0, window.location.pathname.lastIndexOf('/')) + '/' + filename;
            navigator.clipboard.writeText(link).then(() => {
                alert('Copied: ' + filename);
            });
        }
    </script>
</body>
</html>
